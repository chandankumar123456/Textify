<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-size: 12pt;
            line-height: 1.6;
            color: #333;
        }
        h1 {
            font-size: 24pt;
            color: #1a1a2e;
            border-bottom: 2px solid #1a1a2e;
            padding-bottom: 8px;
            margin-top: 0;
        }
        .question-block {
            margin: 20px 0;
            page-break-inside: avoid;
        }
        .question-text {
            font-weight: bold;
            font-size: 13pt;
            margin-bottom: 10px;
        }
        .options-list {
            list-style-type: none;
            padding-left: 10px;
        }
        .options-list li {
            margin: 6px 0;
            padding: 6px 12px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .question-number {
            color: #0f3460;
            font-weight: bold;
        }
        .answer-space {
            margin-top: 10px;
            border-bottom: 1px dotted #999;
            height: 30px;
        }
        .footer-info {
            margin-top: 40px;
            text-align: center;
            color: #999;
            font-size: 10pt;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p style="color: #666;">Total Questions: {{ questions|length }}</p>
    
    {% for q in questions %}
    <div class="question-block">
        <div class="question-text">
            <span class="question-number">{{ q.number }}.</span> {{ q.question }}
        </div>
        {% if q.options %}
        <ul class="options-list">
            {% for opt in q.options %}
            <li>{{ opt }}</li>
            {% endfor %}
        </ul>
        {% else %}
        <div class="answer-space"></div>
        {% endif %}
    </div>
    {% endfor %}
    
    <div class="footer-info">
        Generated by Textify
    </div>
</body>
</html>
